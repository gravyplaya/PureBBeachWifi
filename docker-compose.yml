services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wifi_portal}
      POSTGRES_USER: ${POSTGRES_USER:-wifi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Port managed by Dokploy - do not expose here
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wifi} -d ${POSTGRES_DB:-wifi_portal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  portal:
    build: .
    restart: unless-stopped
    # Port managed by Dokploy - do not expose here
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
