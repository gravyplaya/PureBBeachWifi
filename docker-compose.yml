services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wifi_portal}
      POSTGRES_USER: ${POSTGRES_USER:-wifi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wifi} -d ${POSTGRES_DB:-wifi_portal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  portal:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wifi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wifi_portal}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
